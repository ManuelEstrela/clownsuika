<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clown Suika Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Header -->
        <header class="game-header">
            <h1>🤡 Clown Suika Game 🤡</h1>
        </header>

        <!-- Main Game Container -->
        <div class="game-container">
            <!-- Left Panel - Clown Info -->
            <div class="side-panel left-panel">
                <div class="panel-title">CLOWNS</div>
                <div class="clown-list">
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #FF6B6B; width: 30px; height: 30px;"></div>
                        <span>Tessa</span>
                        <span class="points">1</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #FFA07A; width: 35px; height: 35px;"></div>
                        <span>Twinkles</span>
                        <span class="points">3</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #FFD93D; width: 40px; height: 40px;"></div>
                        <span>Reina</span>
                        <span class="points">6</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #95E1D3; width: 45px; height: 45px;"></div>
                        <span>Osvaldo</span>
                        <span class="points">10</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #6BCB77; width: 50px; height: 50px;"></div>
                        <span>Hazel</span>
                        <span class="points">15</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #4D96FF; width: 55px; height: 55px;"></div>
                        <span>Mumbles</span>
                        <span class="points">21</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #9D84B7; width: 60px; height: 60px;"></div>
                        <span>Sneaky</span>
                        <span class="points">28</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #FF6FB5; width: 65px; height: 65px;"></div>
                        <span>Wendy</span>
                        <span class="points">36</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #F9A826; width: 70px; height: 70px;"></div>
                        <span>Chatty</span>
                        <span class="points">45</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #00D9FF; width: 75px; height: 75px;"></div>
                        <span>Cups</span>
                        <span class="points">55</span>
                    </div>
                    <div class="clown-item">
                        <div class="clown-icon" style="background: #FF0080; width: 80px; height: 80px;"></div>
                        <span>Kirk</span>
                        <span class="points">66</span>
                    </div>
                </div>
            </div>

            <!-- Center - Game Canvas -->
            <div class="center-panel">
                <div class="score-display">
                    <div class="score-label">SCORE</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
                <div class="next-clown">
                    <span>NEXT</span>
                    <div id="nextClownPreview"></div>
                </div>
                <div id="gameCanvas"></div>
            </div>

            <!-- Right Panel - Leaderboard -->
            <div class="side-panel right-panel">
                <div class="panel-title">🏆 TOP SCORES 🏆</div>
                <div id="leaderboardList" class="leaderboard-list">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Name Entry Modal -->
    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h2>Enter Your Name</h2>
            <input type="text" id="playerName" placeholder="Your name" maxlength="20">
            <button id="startButton" class="game-button">START GAME</button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Game Over!</h2>
            <div class="final-score">
                <div class="score-label">YOUR SCORE</div>
                <div class="score-value" id="finalScoreValue">0</div>
            </div>
            <div id="rankDisplay" class="rank-display"></div>
            <div id="gameOverLeaderboard" class="game-over-leaderboard"></div>
            <button id="restartButton" class="game-button">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Phaser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
    
    <!-- Game Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
